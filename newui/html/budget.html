<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бюджет мероприятия</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/budget.css">
  <link rel="icon" href="../images/Logo.svg" sizes="any">
</head>
<body>
<div class="particles"></div>
<header>
  <img src="../images/Logo.svg" alt="наше лого" class="logo">
  <button id="authButton" class="auth-button">
    <span id="authText" class="auth-text"><b>Войти</b></span>
    <span class="user-icon">👤</span>
  </button>
</header>
<div class="back-container">
  <button id="backBtn" class="back-button">
    ← Назад
  </button>
</div>
<main class="main-content">
  <h1 class="page-title">Бюджет мероприятия</h1>
  <div class="container">
    <!-- Панель расходов -->
    <div class="panel expenses-panel">
      <div class="panel-header">
        <h2>Расходы</h2>
        <button type="button" class="create-button" id="add-expense-btn">+ Новая трата</button>
      </div>

      <!-- Фильтры -->
      <div class="filters-section">
        <div class="filter-group">
          <label for="status-filter">Статус траты:</label>
          <select id="status-filter" class="filter-select">
            <option value="">Все траты</option>
            <option value="ACTIVE">Активные</option>
            <option value="PARTIALLY_PAID">Частично оплаченные</option>
            <option value="CLOSED">Закрытые</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="role-filter">Роль:</label>
          <select id="role-filter" class="filter-select">
            <option value="">Все траты</option>
            <option value="owner">Мои траты (я автор)</option>
            <option value="participant">Мои долги (я участник)</option>
          </select>
        </div>
      </div>

      <div class="all-my-events expenses-table-container">
        <table class="expenses-table" id="expenses-table">
          <thead>
          <tr>
            <th>Статья расхода</th>
            <th>Автор траты</th>
            <th>Сумма</th>
            <th>Статус траты</th>
            <th>Детали</th>
          </tr>
          </thead>
          <tbody id="expenses-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Панель долгов -->
    <div class="panel debts-panel">
      <h2>Долги участников</h2>
      <div class="all-my-events debts-table-container">
        <table class="debts-table" id="debts-table">
          <thead>
          <tr>
            <th>Участник</th>
            <th>Сумма долга</th>
          </tr>
          </thead>
          <tbody id="debts-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="expenses-total">
    <div><h2>Общая сумма мероприятия:</h2> <span id="total-amount">0 ₽</span></div>
  </div>

</main>

<!-- Модальное окно для деталей траты -->
<div class="popup-overlay" id="expense-detail-modal">
  <div class="popup-content">
    <button class="popup-close" id="close-detail-btn">×</button>
    <h2 class="modal-title">Детали траты</h2>
    <div class="popup-body">
      <div id="expense-detail-content"></div>
    </div>
  </div>
</div>

<!-- Модальное окно для добавления траты -->
<div class="popup-overlay" id="expense-modal">
  <div class="popup-content">
    <button class="popup-close" id="close-expense-btn">×</button>
    <h2 class="modal-title" id="modal-title">Новая трата</h2>
    <div class="popup-body">
      <form class="event-form" id="expenseForm">
        <!-- Автор траты -->
        <div class="form-row">
          <label>Автор траты:</label>
          <div id="expense-author-display" class="author-display"></div>
        </div>

        <!-- Статья траты -->
        <div class="form-row">
          <label for="expense-description">Статья траты:</label>
          <input type="text" id="expense-description" class="form-input" placeholder="Введите название траты">
        </div>

        <!-- Участники траты (чекбоксы) -->
        <div class="form-row form-row-full">
          <label>Участники траты:</label>
          <div id="participants-checkboxes" class="participants-checkboxes">
            <!-- Здесь будут чекбоксы -->
          </div>
        </div>

        <!-- Сумма -->
        <div class="form-row">
          <label for="expense-amount">Сумма (₽):</label>
          <input type="number" id="expense-amount" class="form-input" placeholder="Введите сумму" min="1" step="0.01">
        </div>

        <!-- Флаг разделения поровну -->
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="is-equally-checkbox"> Разделить поровну
          </label>
        </div>

        <!-- Блок с индивидуальными долями -->
        <div class="form-row form-row-full" id="participant-shares-container" style="display: none;">
          <label>Доли участников:</label>
          <div id="participant-shares-list" class="participant-shares-list">
            <!-- Здесь будут поля ввода для выбранных участников -->
          </div>
        </div>

        <!-- Кнопки действия -->
        <div class="popup-buttons">
          <button type="button" class="popup-cancel" id="cancel-expense-btn">Отмена</button>
          <button type="button" class="popup-delete" id="delete-expense-btn" style="display:none;">Удалить</button>
          <button type="button" class="popup-confirm" id="save-expense-btn">Сохранить</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script type="module" src="../js/budget.js"></script>
</body>
</html>
